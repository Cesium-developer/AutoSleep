name: 编译 C# 版安装包

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 NSIS
        run: choco install nsis --version 3.09 -y

      - name: 将 NSIS 添加到 PATH
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: 编译 C# 项目（5 个）
        shell: cmd
        working-directory: 'csharp'
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework\v4.0.30319\MSBuild.exe
          %MSBUILD% src\AutoSleep.Core\AutoSleep.Core.csproj /p:Configuration=Release
          %MSBUILD% src\AutoSleep.Settings\AutoSleep.Settings.csproj /p:Configuration=Release
          %MSBUILD% src\AutoSleep.Server\AutoSleep.Server.csproj /p:Configuration=Release
          %MSBUILD% src\AutoSleep.Uninstall\AutoSleep.Uninstall.csproj /p:Configuration=Release
          %MSBUILD% src\AutoSleep.Deploy\AutoSleep.Deploy.csproj /p:Configuration=Release

      - name: 编译安装程序
        working-directory: 'csharp/installer'
        run: makensis Setup.nsi

      - name: 移动安装程序到根目录
        run: move csharp\installer\AutoSleep_Setup_Win7_Net40.exe .\

      - name: 生成 SHA256 校验文件
        shell: pwsh
        run: |
          $exe = ".\AutoSleep_Setup_Win7_Net40.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "Installer not found: $exe"
            exit 1
          }
          $hash = Get-FileHash -Algorithm SHA256 $exe
          $hash.Hash | Out-File -Encoding ASCII -FilePath ".\AutoSleep_Setup_Win7_Net40.exe.sha256"
          Write-Host "SHA256: $($hash.Hash)"

      - name: 上传到 Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            AutoSleep_Setup_Win7_Net40.exe
            AutoSleep_Setup_Win7_Net40.exe.sha256
