name: 自动编译安装包

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 NSIS
        run: choco install nsis --version 3.09 -y

      - name: 编译卸载程序
        run: makensis Uninstall.nsi

      - name: 编译安装程序
        run: makensis Setup.nsi

      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: AutoSleep_Setup.exe
