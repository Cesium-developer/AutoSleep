name: 自动编译安装包

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许上传 Release 文件

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 NSIS
        run: choco install nsis --version 3.09 -y

      - name: 将 NSIS 添加到 PATH
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: 编译卸载程序
        run: makensis Uninstall.nsi

      - name: 编译安装程序
        run: makensis Setup.nsi

      - name: 上传到 Release
        uses: softprops/action-gh-release@v3
        with:
          files: AutoSleep_Setup.exe
